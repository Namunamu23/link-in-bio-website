<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ani Khidasheli</title>
  <meta name="description" content="Ani Khidasheli - 2D Animator / Multidisciplinary Artist." />
  <link rel="canonical" href="/" />
  <meta name="theme-color" content="#E3A3BD" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="Ani Khidasheli — 2D Animator" />
  <meta property="og:description" content="Ani Khidasheli - 2D Animator / Multidisciplinary Artist." />
  <meta property="og:url" content="https://aniko.space/" />
  <meta property="og:image" content="https://aniko.space/assets/img/og-cover.png?v=3" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="557" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Ani Khidasheli — 2D Animator" />
  <meta name="twitter:description" content="Ani Khidasheli - 2D Animator / Multidisciplinary Artist." />
  <meta name="twitter:image" content="https://aniko.space/assets/img/og-cover.png?v=3" />

  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="preload" href="assets/fonts/darumadrop-one.woff2" as="font" type="font/woff2" crossorigin />

  <link rel="stylesheet" href="styles/main.css" />
  <script type="module" src="scripts/main.js" defer></script>
</head>
<body>

  <!-- Four hand-painted clouds framing the column, one per corner. Purely visual; hidden from AT. -->
  <div class="sky" aria-hidden="true">
    <img class="sky__cloud sky__cloud--left"        src="assets/img/cloud-a.png" alt="" width="292" height="245" decoding="async">
    <img class="sky__cloud sky__cloud--right"       src="assets/img/cloud-d.png" alt="" width="560" height="366" decoding="async">
    <img class="sky__cloud sky__cloud--lower-left"  src="assets/img/cloud-c.png" alt="" width="560" height="356" decoding="async">
    <img class="sky__cloud sky__cloud--lower-right" src="assets/img/cloud-b.png" alt="" width="245" height="216" decoding="async">
  </div>

  <main>

    <!-- Name sits inside her painted cloud. Text is injected from data/content.js. -->
    <h1 class="name-cloud">
      <img class="name-cloud__bg" src="assets/img/cloud-main.png" alt="" width="760" height="483" decoding="async" fetchpriority="high">
      <span class="name-cloud__name" data-name>ANIKO</span>
    </h1>

    <!-- Three painted drops that gently float down and up (constant size). Decorative. -->
    <div class="rain" aria-hidden="true">
      <span class="drop drop--left">
        <img class="drop__f" src="assets/img/drop-left-1.png"  alt="" width="45" height="47"  decoding="async">
      </span>
      <span class="drop drop--mid">
        <img class="drop__f" src="assets/img/drop-mid-1.png"   alt="" width="60" height="56" decoding="async">
      </span>
      <span class="drop drop--right">
        <img class="drop__f" src="assets/img/drop-right-1.png" alt="" width="43" height="45"  decoding="async">
      </span>
    </div>

    <p class="role" data-role>2D Animator</p>

    <!-- Social icons. Instagram opens a modal; LinkedIn opens in a new tab. -->
    <div class="socials">
      <button type="button" class="social-btn" data-open-ig aria-haspopup="dialog" aria-controls="ig-modal" aria-label="Show Instagram accounts">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M9 5 Q5 5 5 9 L5 31 Q5 35 9 35 L31 35 Q35 35 35 31 L35 9 Q35 5 31 5 Z"/>
          <circle cx="20" cy="20" r="7"/>
          <circle cx="29" cy="11" r="1.6" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <a class="social-btn" data-linkedin href="#" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile (opens in a new tab)">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 5 Q4 5 4 10 L4 31 Q4 35 8 35 L31 35 Q35 35 35 31 L35 10 Q35 5 31 5 Z"/>
          <circle cx="12" cy="14" r="1.8" fill="currentColor" stroke="none"/>
          <path d="M12 18 L12 30"/>
          <path d="M18 30 L18 18"/>
          <path d="M18 22 Q22 18 26 21 Q28 24 28 30"/>
        </svg>
      </a>
    </div>

    <!-- Two rounded buttons stacked. -->
    <nav class="big-buttons" aria-label="Primary links">
      <a class="big-btn big-btn--portfolio" data-portfolio href="#" target="_blank" rel="noopener noreferrer">
        <span class="big-btn__label">Portfolio</span>
      </a>
      <button type="button" class="big-btn big-btn--contact" data-contact aria-label="Contact by email">
        <span class="big-btn__label">Contact</span>
      </button>
    </nav>

    <p class="commissions" data-commissions hidden>Commissions open</p>
  </main>

  <!-- Instagram modal. Hidden by default; JS toggles data-open and focus. -->
  <div class="modal" id="ig-modal" data-modal hidden role="dialog" aria-modal="true" aria-labelledby="ig-title">
    <div class="modal__panel">
      <button type="button" class="modal__close" data-close-modal aria-label="Close">×</button>
      <h2 id="ig-title" class="modal__title">Instagram</h2>
      <ul class="modal__list" data-ig-list></ul>
    </div>
  </div>

</body>
</html>
