<body>

  <!-- Decorative drifting clouds. Purely visual; hidden from AT. -->
  <div class="sky" aria-hidden="true">
    <svg class="sky__cloud sky__cloud--tl" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 80 Q5 62 30 52 Q24 22 60 30 Q78 5 112 22 Q140 8 168 28 Q202 22 200 55 Q222 70 202 88 Q212 108 180 106 Q166 122 134 108 Q104 122 78 106 Q54 116 34 98 Q5 100 20 80 Z"/>
    </svg>
    <svg class="sky__cloud sky__cloud--tr" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
      <path d="M28 74 Q10 60 34 46 Q28 18 62 28 Q86 4 118 24 Q152 6 176 30 Q208 24 206 56 Q224 74 200 88 Q206 110 174 106 Q160 120 132 108 Q106 120 82 108 Q54 116 30 98 Q6 90 28 74 Z"/>
    </svg>
    <svg class="sky__cloud sky__cloud--bl" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
      <path d="M22 82 Q6 66 28 54 Q22 24 58 32 Q80 8 108 26 Q138 10 164 30 Q198 28 198 58 Q222 72 200 90 Q208 108 178 108 Q160 122 128 108 Q100 120 76 106 Q50 114 30 96 Q6 96 22 82 Z"/>
    </svg>
    <svg class="sky__cloud sky__cloud--br" viewBox="0 0 220 130" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 78 Q8 62 32 50 Q26 22 62 28 Q84 6 114 24 Q142 8 168 28 Q202 22 202 54 Q222 68 202 88 Q214 108 182 108 Q166 122 136 110 Q106 122 82 108 Q54 116 32 98 Q4 98 24 78 Z"/>
    </svg>
  </div>

  <main>

    <!-- Name in a pale-pink cloud. Text is injected from data/content.js. -->
    <h1 class="name-cloud">
      <svg class="name-cloud__svg" viewBox="0 0 400 180" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 108
                 Q10 92 34 74
                 Q28 42 68 50
                 Q86 22 128 42
                 Q158 18 198 40
                 Q238 18 272 42
                 Q302 22 336 50
                 Q374 46 372 82
                 Q394 100 374 128
                 Q384 154 350 154
                 Q332 174 300 162
                 Q276 178 244 162
                 Q212 176 178 162
                 Q142 178 108 162
                 Q78 172 58 154
                 Q26 154 34 128
                 Q10 118 32 108 Z"/>
      </svg>
      <span class="name-cloud__name" data-name>Ani Khidasheli</span>
    </h1>

    <!-- Three drops falling in a staggered loop. Decorative. -->
    <div class="rain" aria-hidden="true">
      <svg class="rain__drop rain__drop--1" viewBox="0 0 20 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2 C5 13 3 20 4 24 C4 28 7 29 10 29 C13 29 16 28 16 24 C17 20 15 13 10 2 Z"/>
      </svg>
      <svg class="rain__drop rain__drop--2" viewBox="0 0 20 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2 C6 12 3 20 4 24 C4 28 7 29 10 29 C13 29 16 28 16 24 C17 20 14 12 10 2 Z"/>
      </svg>
      <svg class="rain__drop rain__drop--3" viewBox="0 0 20 30" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2 C5 12 3 21 4 25 C4 28 7 29 10 29 C13 29 16 28 16 25 C17 21 15 12 10 2 Z"/>
      </svg>
    </div>

    <p class="role" data-role>2D Animator</p>

    <!-- Social icons. Instagram opens a modal; LinkedIn opens in a new tab. -->
    <div class="socials">
      <button type="button" class="social-btn" data-open-ig aria-haspopup="dialog" aria-controls="ig-modal" aria-label="Show Instagram accounts">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M9 5 Q5 5 5 9 L5 31 Q5 35 9 35 L31 35 Q35 35 35 31 L35 9 Q35 5 31 5 Z"/>
          <circle cx="20" cy="20" r="7"/>
          <circle cx="29" cy="11" r="1.6" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <a class="social-btn" data-linkedin href="#" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile (opens in a new tab)">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M8 5 Q4 5 4 10 L4 31 Q4 35 8 35 L31 35 Q35 35 35 31 L35 10 Q35 5 31 5 Z"/>
          <circle cx="12" cy="14" r="1.8" fill="currentColor" stroke="none"/>
          <path d="M12 18 L12 30"/>
          <path d="M18 30 L18 18"/>
          <path d="M18 22 Q22 18 26 21 Q28 24 28 30"/>
        </svg>
      </a>
    </div>

    <!-- Two big hand-drawn buttons stacked. -->
    <nav class="big-buttons" aria-label="Primary links">
      <a class="big-btn big-btn--portfolio" data-portfolio href="#" target="_blank" rel="noopener noreferrer">
        <svg class="big-btn__shape" viewBox="0 0 400 96" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M26 44
                   Q16 14 58 20
                   Q104 8 158 16
                   Q206 6 252 16
                   Q302 8 340 20
                   Q380 22 376 48
                   Q392 76 342 82
                   Q302 92 250 84
                   Q198 92 146 84
                   Q98 92 54 82
                   Q14 82 26 54
                   Q22 50 26 44 Z"/>
        </svg>
        <span class="big-btn__label">Portfolio</span>
      </a>
      <button type="button" class="big-btn big-btn--contact" data-contact aria-label="Contact by email">
        <svg class="big-btn__shape" viewBox="0 0 400 96" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M28 46
                   Q14 18 60 22
                   Q108 10 160 18
                   Q210 8 258 18
                   Q306 10 342 22
                   Q384 22 378 50
                   Q390 78 340 84
                   Q300 92 252 84
                   Q200 92 148 84
                   Q100 92 56 82
                   Q16 82 24 54
                   Q20 48 28 46 Z"/>
        </svg>
        <span class="big-btn__label">Contact</span>
      </button>
    </nav>

    <p class="commissions" data-commissions hidden>Commissions open</p>
  </main>

  <!-- Instagram modal. Hidden by default; JS toggles data-open and focus. -->
  <div class="modal" id="ig-modal" data-modal hidden role="dialog" aria-modal="true" aria-labelledby="ig-title">
    <div class="modal__panel">
      <button type="button" class="modal__close" data-close-modal aria-label="Close">×</button>
      <h2 id="ig-title" class="modal__title">Instagram</h2>
      <ul class="modal__list" data-ig-list></ul>
    </div>
  </div>

</body>
</html>
